<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Cormorant+Garamond:wght@500&family=Source+Serif+4:opsz,wght@8..60,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    {% assign fonts = site.projects | map: "font" | compact | uniq %}
    {% if fonts.size > 0 %}
    <link href="https://fonts.googleapis.com/css2?{% for font in fonts %}family={{ font | replace: ' ', '+' }}:wght@400;700{% unless forloop.last %}&{% endunless %}{% endfor %}&display=swap" rel="stylesheet">
    {% endif %}

    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/font.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/landing-page.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/projects.css' | relative_url }}">

    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
</head>
<body>
    {{ content }}

    <script src="{{ '/js/logo.js' | relative_url }}"></script>
</body>
</html>
