<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Cormorant+Garamond:wght@500&family=Source+Serif+4:opsz,wght@8..60,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <section id="projects-section">
